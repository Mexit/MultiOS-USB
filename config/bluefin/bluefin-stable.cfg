# Bluefin
# https://projectbluefin.io

iso_pattern="bluefin*-stable-x86_64.iso"

for isofile in ($dev,*)$iso_dir/$iso_pattern; do
	if [ -e "$isofile" ]; then
		regexp --set=isoname "$iso_dir/(.*)" "$isofile"

		submenu "$isoname ->" "$isofile" "$iso_dir/$isoname" {
			iso_path="$3"
			LOOPBACK "$2"
			probe --label --set=cd_label (loop)
			isocfg="iso-scan/filename=$iso_path"
			bootoptions="root=live:CDLABEL=$cd_label quiet rhgb enforcing=0 rd.live.image"
			linux_path="(loop)/boot/vmlinuz"
			initrd_path="(loop)/boot/initramfs.img"

			menuentry 'Bluefin Live ISO' --class fedora --class gnu-linux --class gnu --class os {
				echo Loading kernel...
				linux $linux_path $isocfg $bootoptions
				echo Loading initrd...
				initrd $initrd_path
			}
			menuentry 'Bluefin Live ISO (Basic Graphics Mode)' --class fedora --class gnu-linux --class gnu --class os {
				echo Loading kernel...
				linux $linux_path $isocfg $bootoptions nomodeset
				echo Loading initrd...
				initrd $initrd_path
			}
		}
	fi
done
